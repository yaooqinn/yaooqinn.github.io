name: md2wechat

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**/*.zh.md'
      - 'scripts/md2wechat.py'
      - '.github/workflows/md2wechat.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Specific .zh.md path (leave blank = all)'
        required: false
        default: ''
      theme:
        description: 'Color theme'
        required: false
        default: 'green'
        type: choice
        options: [green, blue, orange, purple]

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install markdown

      - name: Pick target files
        id: pick
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.target }}" ]; then
            FILES="${{ github.event.inputs.target }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.before }}..${{ github.sha }} -- 'content/posts/**/*.zh.md' || true)
            if [ -z "$CHANGED" ]; then
              CHANGED=$(find content/posts -name '*.zh.md' -type f)
            fi
            FILES=$(echo "$CHANGED" | xargs)
          else
            FILES=$(find content/posts -name '*.zh.md' -type f | xargs)
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Will convert: $FILES"

      - name: Convert
        run: |
          set -euo pipefail
          THEME="${{ github.event.inputs.theme || 'green' }}"
          for f in ${{ steps.pick.outputs.files }}; do
            echo "::group::$f"
            python3 scripts/md2wechat.py "$f" --theme "$THEME"
            echo "::endgroup::"
          done

      - name: Generate index
        run: |
          set -euo pipefail
          cd static/wechat
          {
            echo '<!doctype html><html lang="zh-cn"><head><meta charset="utf-8">'
            echo '<meta name="viewport" content="width=device-width,initial-scale=1">'
            echo '<title>WeChat HTML index</title>'
            echo '<style>body{max-width:677px;margin:0 auto;padding:20px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.7;color:#333}h1{font-size:20px;border-bottom:2px solid #07c160;padding-bottom:8px}li{margin:8px 0}a{color:#07c160;text-decoration:none;word-break:break-all}.note{background:#f7f7f7;padding:12px;border-left:3px solid #07c160;font-size:14px;color:#666;border-radius:4px}</style>'
            echo '</head><body>'
            echo '<h1>📨 WeChat HTML 索引</h1>'
            echo '<p class="note">手机打开 → 进入文章 → 长按 → 全选 → 复制 → 粘贴进公众号编辑器。图片自动转 WeChat CDN。</p>'
            echo '<ul>'
            for f in *.html; do
              [ "$f" = "index.html" ] && continue
              SLUG="${f%.html}"
              echo "<li><a href=\"./${f}\">${SLUG}</a></li>"
            done
            echo '</ul></body></html>'
          } > index.html

      - name: Commit & push to main
        run: |
          set -euo pipefail
          git config user.email "yao@apache.org"
          git config user.name "Kent Yao (md2wechat bot)"
          git add static/wechat/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(wechat): regenerate WeChat HTML [skip ci]"
          # Avoid recursion: push triggers workflow only on content/scripts/workflow paths.
          # static/wechat/** is NOT in the trigger paths, so this push is safe.
          git pull --rebase origin main
          git push origin main

      - name: Job summary
        run: |
          {
            echo "## 📨 WeChat HTML — open on your phone"
            echo ""
            echo "Files are now committed to \`static/wechat/\` and served at fixed URLs after GitHub Pages deploys (~1 min)."
            echo ""
            for f in static/wechat/*.html; do
              SLUG=$(basename "$f" .html)
              echo "- 🔗 https://yaooqinn.github.io/wechat/${SLUG}.html"
            done
            echo ""
            echo "### Paste into WeChat (mobile)"
            echo "1. Open the URL above on your phone"
            echo "2. Long-press → 全选 → 复制"
            echo "3. Paste into 公众号 editor — images auto-fetch to WeChat CDN"
          } >> "$GITHUB_STEP_SUMMARY"
