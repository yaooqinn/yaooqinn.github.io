baseURL = "https://yaooqinn.github.io/"
languageCode = "en-us"
title = "Kent Yao"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Kent Yao"
  description = "ASF Member · Apache Kyuubi PMC Chair · Apache Spark PMC Member · Open Source Enthusiast"
  keywords = ["Kent Yao", "Apache Spark", "Apache Kyuubi", "Open Source", "Big Data"]
  author = "Kent Yao"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  comments = false

  [params.assets]
    favicon = "https://avatars.githubusercontent.com/yaooqinn"
    favicon16x16 = "https://avatars.githubusercontent.com/yaooqinn"
    favicon32x32 = "https://avatars.githubusercontent.com/yaooqinn"
    apple_touch_icon = "https://avatars.githubusercontent.com/yaooqinn"

  [params.profileMode]
    enabled = true
    title = "Kent Yao"
    subtitle = """🧑‍🤝‍🧑 ASF Member · 🦊 Apache Kyuubi VP · ✨ Apache Spark PMC Member
Open source contributor passionate about big data, distributed systems, and building communities."""
    imageUrl = "https://avatars.githubusercontent.com/yaooqinn"
    imageWidth = 160
    imageHeight = 160
    imageTitle = "Kent Yao"

    [[params.profileMode.buttons]]
      name = "About"
      url = "/about/"

    [[params.profileMode.buttons]]
      name = "Projects"
      url = "/projects/"

    [[params.profileMode.buttons]]
      name = "Blog"
      url = "/posts/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yaooqinn"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/kent-yao/"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/kent_zju"

  [[params.socialIcons]]
    name = "youtube"
    url = "https://www.youtube.com/channel/UCJB4x5YuERIWS4U0i82A4XQ"

  [params.homeInfoParams]
    Title = "Kent Yao"
    Content = "ASF Member · Apache Kyuubi VP · Apache Spark PMC Member"

  [params.cover]
    hidden = true
    hiddenInList = true
    hiddenInSingle = true

[params.editPost]
  URL = "https://github.com/yaooqinn/yaooqinn.github.io/tree/main/content"
  Text = "Suggest Changes"
  appendFilePath = true

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 10

[[menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 20

[[menu.main]]
  identifier = "posts"
  name = "Blog"
  url = "/posts/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
