<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1175 500" width="1175" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e25a1c"/>
      <stop offset="1" stop-color="#f5a14a"/>
    </linearGradient>
    <style>
      .sans { font-family: 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace; }
    </style>
  </defs>

  <rect width="1175" height="500" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#30363d" stroke-width="0.5" opacity="0.35">
    <line x1="0" y1="125" x2="1175" y2="125"/>
    <line x1="0" y1="250" x2="1175" y2="250"/>
    <line x1="0" y1="375" x2="1175" y2="375"/>
  </g>

  <!-- top eyebrow -->
  <text x="60" y="72" class="mono" font-size="16" fill="#8b949e" letter-spacing="2">
    arXiv:2605.22992 · ETH ZÜRICH · 2026-05
  </text>

  <!-- title -->
  <text x="60" y="130" class="sans" font-size="42" font-weight="700" fill="#e6edf3">
    翻转分支找性能 bug
  </text>
  <text x="60" y="178" class="sans" font-size="22" font-weight="500" fill="#8b949e">
    Branch Flip Analysis · A White-Box Way to Test Optimizers
  </text>

  <!-- divider -->
  <rect x="60" y="208" width="80" height="3" fill="url(#orange)"/>

  <!-- 3 stat blocks -->
  <g transform="translate(60,250)">
    <!-- block 1 -->
    <g>
      <text x="0" y="0" class="mono" font-size="13" fill="#8b949e" letter-spacing="1.5">FOUND</text>
      <text x="0" y="68" class="mono" font-size="84" font-weight="700" fill="url(#orange)">21</text>
      <text x="0" y="105" class="sans" font-size="15" fill="#e6edf3">个未知性能 bug</text>
      <text x="0" y="128" class="sans" font-size="13" fill="#6e7681">previously unknown issues</text>
    </g>

    <!-- block 2 -->
    <g transform="translate(360,0)">
      <text x="0" y="0" class="mono" font-size="13" fill="#8b949e" letter-spacing="1.5">TESTED</text>
      <text x="0" y="68" class="mono" font-size="84" font-weight="700" fill="#e6edf3">4</text>
      <text x="0" y="105" class="sans" font-size="15" fill="#e6edf3">个成熟 DBMS</text>
      <text x="0" y="128" class="mono" font-size="13" fill="#79c0ff">PostgreSQL · MySQL · CockroachDB · MariaDB</text>
    </g>

    <!-- block 3 -->
    <g transform="translate(750,0)">
      <text x="0" y="0" class="mono" font-size="13" fill="#8b949e" letter-spacing="1.5">METHOD</text>
      <text x="0" y="68" class="mono" font-size="84" font-weight="700" fill="#e6edf3">1</text>
      <text x="0" y="105" class="sans" font-size="15" fill="#e6edf3">条规则：翻转 if 分支</text>
      <text x="0" y="128" class="sans" font-size="13" fill="#6e7681">flip the optimization branch, check timing</text>
    </g>
  </g>

  <!-- bottom: code-style takeaway -->
  <g transform="translate(60,420)">
    <rect x="0" y="0" width="1055" height="48" rx="6" fill="#1c222b" stroke="#30363d"/>
    <text x="18" y="31" class="mono" font-size="15" fill="#3fb950">$</text>
    <text x="38" y="31" class="mono" font-size="15" fill="#e6edf3">spark.sql.optimizer.excludedRules</text>
    <text x="380" y="31" class="mono" font-size="15" fill="#8b949e">→</text>
    <text x="404" y="31" class="mono" font-size="15" fill="#f5a14a">the branch-flip knob Spark already ships</text>
  </g>
</svg>
