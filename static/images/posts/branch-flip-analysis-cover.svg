t="700" transform="translate(60,250) translate(360,0)">4</text><text x="0" y="105" fill="#e6edf3" class="sans" font-size="15" transform="translate(60,250) translate(360,0)">个成熟 DBMS</text><text x="0" y="128" fill="#79c0ff" class="mono" font-size="13" transform="translate(60,250) translate(360,0)">PostgreSQL · MySQL · CockroachDB · MariaDB</text></g><g><text x="0" y="0" fill="#8b949e" class="mono" font-size="13" letter-spacing="1.5" transform="translate(60,250) translate(750,0)">METHOD</text><text x="0" y="68" fill="#e6edf3" class="mono" font-size="84" font-weight="700" transform="translate(60,250) translate(750,0)">1</text><text x="0" y="105" fill="#e6edf3" class="sans" font-size="15" transform="translate(60,250) translate(750,0)">条规则：翻转 if 分支</text><text x="0" y="128" fill="#6e7681" class="sans" font-size="13" transform="translate(60,250) translate(750,0)">flip the optimization branch, check timing</text></g></g><g transform="translate(60,420)"><rect width="1055" height="48" x="0" y="0" fill="#1c222b" stroke="#30363d" rx="6"/><text x="18" y="31" fill="#3fb950" class="mono" font-size="15">$</text><text x="38" y="31" fill="#e6edf3" class="mono" font-size="15">spark.sql.optimizer.excludedRules</text><text x="380" y="31" fill="#8b949e" class="mono" font-size="15">→</text><text x="404" y="31" fill="#f5a14a" class="mono" font-size="15">the branch-flip knob Spark already ships</text></g></svg>