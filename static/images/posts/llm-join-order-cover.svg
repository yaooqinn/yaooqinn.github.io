<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1175 500" font-family="'Noto Sans CJK SC','Noto Sans SC','PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="bar-agent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e25a1c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="bar-perfect" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#718096"/>
    </linearGradient>
  </defs>

  <rect width="1175" height="500" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#2a3142" stroke-width="1" opacity="0.4">
    <line x1="0" y1="125" x2="1175" y2="125"/>
    <line x1="0" y1="250" x2="1175" y2="250"/>
    <line x1="0" y1="375" x2="1175" y2="375"/>
  </g>

  <!-- top eyebrow -->
  <text x="60" y="60" fill="#e25a1c" font-size="16" font-weight="700" letter-spacing="3">DATABRICKS × UPENN · JOB BENCHMARK · 113 QUERIES</text>

  <!-- title -->
  <text x="60" y="115" fill="#f0f3f8" font-size="38" font-weight="800">LLM agent 做 Join Order</text>
  <text x="60" y="160" fill="#9aa5b8" font-size="20" font-weight="400">离线反复试探,赢过 cost-based optimizer + 完美基数估计</text>

  <!-- Three big numbers row -->
  <g>
    <!-- Number 1: 1.288x -->
    <text x="60" y="280" fill="#f97316" font-size="84" font-weight="800" font-family="Menlo,Monaco,monospace">1.288×</text>
    <text x="60" y="315" fill="#9aa5b8" font-size="16" font-weight="600">几何均值提速</text>
    <text x="60" y="338" fill="#6b7585" font-size="13">vs Databricks Runtime 默认</text>

    <!-- divider -->
    <line x1="380" y1="240" x2="380" y2="345" stroke="#2a3142" stroke-width="1"/>

    <!-- Number 2: -41% -->
    <text x="420" y="280" fill="#f97316" font-size="84" font-weight="800" font-family="Menlo,Monaco,monospace">−41%</text>
    <text x="420" y="315" fill="#9aa5b8" font-size="16" font-weight="600">P90 latency 下降</text>
    <text x="420" y="338" fill="#6b7585" font-size="13">长尾查询消失</text>

    <!-- divider -->
    <line x1="710" y1="240" x2="710" y2="345" stroke="#2a3142" stroke-width="1"/>

    <!-- Number 3: 1 tool -->
    <text x="750" y="280" fill="#f97316" font-size="84" font-weight="800" font-family="Menlo,Monaco,monospace">1</text>
    <text x="750" y="315" fill="#9aa5b8" font-size="16" font-weight="600">tool: execute(plan)</text>
    <text x="750" y="338" fill="#6b7585" font-size="13">grammar 强制合法输出</text>
  </g>

  <!-- Bottom: comparison bars -->
  <g transform="translate(60, 380)">
    <text x="0" y="0" fill="#9aa5b8" font-size="13" font-weight="600" letter-spacing="2">几何均值提速对比(↑ 越高越快)</text>

    <!-- DBR default baseline -->
    <text x="0" y="28" fill="#6b7585" font-size="12">DBR 默认</text>
    <rect x="120" y="18" width="200" height="14" fill="url(#bar-perfect)" rx="2"/>
    <text x="330" y="29" fill="#9aa5b8" font-size="12" font-family="Menlo,Monaco,monospace">1.000×</text>

    <!-- Perfect cardinality -->
    <text x="0" y="56" fill="#6b7585" font-size="12">完美基数估计</text>
    <rect x="120" y="46" width="240" height="14" fill="url(#bar-perfect)" rx="2"/>
    <text x="370" y="57" fill="#9aa5b8" font-size="12" font-family="Menlo,Monaco,monospace">~1.20×</text>

    <!-- LLM agent -->
    <text x="0" y="84" fill="#f97316" font-size="12" font-weight="700">LLM agent</text>
    <rect x="120" y="74" width="258" height="14" fill="url(#bar-agent)" rx="2"/>
    <text x="388" y="85" fill="#f97316" font-size="12" font-weight="700" font-family="Menlo,Monaco,monospace">1.288×</text>
  </g>

  <!-- Right side: key insight callout -->
  <g transform="translate(720, 385)">
    <rect x="0" y="0" width="395" height="90" fill="#1a1f2e" stroke="#e25a1c" stroke-width="2" rx="6"/>
    <text x="18" y="28" fill="#e25a1c" font-size="13" font-weight="700" letter-spacing="2">为什么能赢?</text>
    <text x="18" y="52" fill="#f0f3f8" font-size="14">试错 &gt; 建模 —— agent 直接看 wall-clock,</text>
    <text x="18" y="72" fill="#f0f3f8" font-size="14">绕过 cost model 在现代硬件上的失真。</text>
  </g>

  <!-- bottom credit -->
  <text x="60" y="488" fill="#4a5568" font-size="11">yaooqinn.github.io · Apache Spark Perspective</text>
</svg>
